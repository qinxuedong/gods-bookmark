<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God's Bookmark 书签同步</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #8b5cf6;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .status.enabled {
      background: #d1fae5;
      color: #065f46;
    }
    .status.disabled {
      background: #fee2e2;
      color: #991b1b;
    }
    .config-item {
      margin-bottom: 12px;
    }
    label {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    input[type="checkbox"] {
      margin-right: 8px;
    }
    .server-url {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #8b5cf6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 8px;
    }
    button:hover {
      background: #7c3aed;
    }
    button.secondary {
      background: #6b7280;
      margin-top: 4px;
    }
    button.secondary:hover {
      background: #4b5563;
    }
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>📚 书签同步</h3>
  
  <div id="status" class="status"></div>
  
  <div class="config-item">
    <label>
      <input type="checkbox" id="enabled">
      <span>启用自动同步</span>
    </label>
  </div>
  
  <div class="config-item">
    <label>
      <input type="checkbox" id="syncOnCreate">
      <span>新书签时同步</span>
    </label>
  </div>
  
  <div class="config-item">
    <label>
      <input type="checkbox" id="syncOnUpdate">
      <span>书签更新时同步</span>
    </label>
  </div>
  
  <div class="config-item">
    <label>
      <input type="checkbox" id="syncOnRemove">
      <span>书签删除时同步</span>
    </label>
  </div>
  
  <div class="config-item">
    <label style="display: block; margin-bottom: 4px;">服务器地址：</label>
    <input type="text" id="serverUrl" class="server-url" placeholder="http://localhost:3000">
  </div>
  
  <button id="saveBtn">保存设置</button>
  <button id="testBtn" class="secondary">测试连接</button>
  <button id="syncAllBtn" class="secondary">立即同步所有书签</button>
  <button id="optionsBtn" class="secondary">高级设置</button>
  
  <div class="footer">
    点击"高级设置"查看更多选项
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
