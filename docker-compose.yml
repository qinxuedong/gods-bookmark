version: '3.8'

services:
  gods-bookmark:
    # 方式一：使用发布的镜像（推荐，无需构建）
    # image: ghcr.io/qinxuedong/gods-bookmark:latest
    # 或使用 Docker Hub 镜像：
    # image: qinxuedong/gods-bookmark:latest
    
    # 方式二：本地构建（取消注释以下行，并注释掉上面的 image）
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: gods-bookmark
    restart: unless-stopped
    ports:
      - "3000:3000"  # 格式：宿主机端口:容器端口，可根据需要修改宿主机端口
    volumes:
      # 数据目录持久化（数据库文件）
      - ./data:/app/data
      # 备份目录持久化（备份文件）
      - ./backups:/app/backups
    env_file:
      # 从 .env 文件加载环境变量
      - .env
    networks:
      - gods-bookmark-network
    # 健康检查
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/check-auth', (r) => {process.exit(r.statusCode === 200 || r.statusCode === 401 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  gods-bookmark-network:
    driver: bridge
