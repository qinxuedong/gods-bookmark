services:
  gods-bookmark:
    image: ghcr.io/qinxuedong/gods-bookmark:latest
    container_name: gods-bookmark
    restart: unless-stopped
    ports:
      - "3000:3000" # 格式：宿主机端口:容器端口，可根据需要修改宿主机端口
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/check-auth', r => process.exit([200,401].includes(r.statusCode) ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  gods-bookmark-network:
    driver: bridge
