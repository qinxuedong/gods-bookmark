name: gods-bookmark-release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ----------------------------
     # 1. 计算并注入扩展版本号
# ----------------------------
- name: Inject version into extension manifest
  run: |
    RAW_VERSION="${GITHUB_REF_NAME#v}"

    # 提取纯数字版本号（去掉 RC / beta 等）
    EXT_VERSION=$(echo "$RAW_VERSION" | sed -E 's/^([0-9]+(\.[0-9]+)*).*/\1/')

    echo "Release tag       => $RAW_VERSION"
    echo "Extension version => $EXT_VERSION"

    # 注入 version
    jq --arg version "$EXT_VERSION" \
      '.version = $version' \
      extension/manifest.json > extension/manifest.json.tmp

    mv extension/manifest.json.tmp extension/manifest.json

    # 在 description 里追加 RC 标识（如果 tag 包含 RC）
    if echo "$RAW_VERSION" | grep -qi "rc"; then
      jq '.description = (.description + " (RC)")' \
        extension/manifest.json > extension/manifest.json.tmp
      mv extension/manifest.json.tmp extension/manifest.json
    fi

      # ----------------------------
      # 2. 打包扩展（zip 名含版本）
      # ----------------------------
      - name: Package browser extension
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd extension
          zip -r "../gods-bookmark-extension-${VERSION}.zip" .
          cd ..

      # ----------------------------
      # 3. 上传到 Release Assets
      # ----------------------------
      - name: Upload extension to Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gods-bookmark-extension-*.zip

      # ----------------------------
      # 4. 构建并推送 Docker（你已有的）
      # ----------------------------
      - name: Login ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:latest
